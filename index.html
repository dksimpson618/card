<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>심동기 | 시뮬레이션 모델링 & 개발자</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1117;
      --card-bg: #1a1d2e;
      --card-border: rgba(99, 102, 241, 0.25);
      --accent: #6366f1;
      --accent2: #22d3ee;
      --accent3: #a78bfa;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --chip-bg: rgba(99, 102, 241, 0.12);
      --chip-border: rgba(99, 102, 241, 0.3);
      --glow: rgba(99, 102, 241, 0.4);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans KR', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: orbFloat 8s ease-in-out infinite;
    }
    .bg-orb-1 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(99,102,241,0.18), transparent 70%);
      top: -100px; left: -100px;
      animation-delay: 0s;
    }
    .bg-orb-2 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(34,211,238,0.12), transparent 70%);
      bottom: -80px; right: -80px;
      animation-delay: -4s;
    }
    .bg-orb-3 {
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(167,139,250,0.1), transparent 70%);
      top: 50%; left: 60%;
      animation-delay: -2s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      animation: particleFly linear infinite;
    }

    @keyframes particleFly {
      0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-20px) translateX(var(--drift)); opacity: 0; }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      width: min(480px, 92vw);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 48px 40px 40px;
      box-shadow:
        0 0 0 1px rgba(99,102,241,0.1),
        0 20px 60px rgba(0,0,0,0.5),
        0 0 80px var(--glow);
      animation: cardAppear 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
      transform: translateY(40px) scale(0.95);
    }

    @keyframes cardAppear {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Top accent bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    }

    /* Avatar section */
    .avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
    }

    .avatar-ring {
      position: relative;
      width: 130px; height: 130px;
      margin-bottom: 4px;
    }

    .avatar-ring::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        var(--accent),
        var(--accent2),
        var(--accent3),
        var(--accent)
      );
      animation: spinRing 4s linear infinite;
      z-index: 0;
    }

    @keyframes spinRing {
      to { transform: rotate(360deg); }
    }

    .avatar-ring::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        var(--accent),
        var(--accent2),
        var(--accent3),
        var(--accent)
      );
      filter: blur(8px);
      opacity: 0.5;
      animation: spinRing 4s linear infinite;
      z-index: 0;
    }

    .avatar-img {
      position: relative;
      z-index: 1;
      width: 130px; height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--card-bg);
      display: block;
    }

    /* Status badge */
    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.25);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      color: #4ade80;
      font-weight: 500;
      letter-spacing: 0.04em;
    }
    .status-dot {
      width: 7px; height: 7px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Name & Title */
    .name {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #f1f5f9, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .title {
      text-align: center;
      font-size: 14px;
      color: var(--accent2);
      font-weight: 500;
      letter-spacing: 0.03em;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 20px;
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(99,102,241,0.3), transparent);
      margin: 20px 0;
    }

    /* Bio */
    .bio {
      text-align: center;
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
      padding: 0 8px;
      margin-bottom: 20px;
    }

    /* Skills chips */
    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .chip {
      background: var(--chip-bg);
      border: 1px solid var(--chip-border);
      color: #a5b4fc;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
      transition: all 0.2s ease;
      cursor: default;
    }
    .chip:hover {
      background: rgba(99,102,241,0.22);
      border-color: rgba(99,102,241,0.5);
      color: #c7d2fe;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(99,102,241,0.2);
    }

    /* Contact */
    .contact {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 13.5px;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .contact-item:hover {
      background: rgba(99,102,241,0.1);
      border-color: rgba(99,102,241,0.3);
      color: var(--text-primary);
      transform: translateX(4px);
    }

    .contact-icon {
      width: 34px; height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .icon-email { background: rgba(99,102,241,0.15); }
    .icon-github { background: rgba(255,255,255,0.06); }
    .icon-linkedin { background: rgba(14,118,168,0.15); }
    .contact-item.linkedin:hover {
      background: rgba(14,118,168,0.12);
      border-color: rgba(14,118,168,0.4);
    }

    .contact-label {
      font-size: 10px;
      color: var(--text-secondary);
      opacity: 0.6;
      display: block;
      margin-bottom: 1px;
    }

    .contact-value {
      color: var(--text-primary);
      font-weight: 500;
      font-size: 13px;
    }

    /* Copy toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(30,32,50,0.95);
      border: 1px solid rgba(99,102,241,0.4);
      color: #a5b4fc;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: rgba(148,163,184,0.35);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
  <div class="particles" id="particles"></div>

  <div class="card" id="card">

    <div class="avatar-section">
      <div class="avatar-ring">
        <img class="avatar-img" src="assets/avatar.png" alt="심동기 캐릭터" />
      </div>
      <div class="status-badge">
        <span class="status-dot"></span>
        Available for Projects
      </div>
    </div>

    <div class="name">심동기</div>
    <div class="title">// Simulation Modeling & Developer</div>

    <div class="divider"></div>

    <p class="bio">
      복잡한 시스템을 모델로 만들고, 코드로 현실을 시뮬레이션합니다.<br>
      데이터 기반 의사결정과 정교한 모델링을 통해<br>
      더 나은 결과를 설계합니다.
    </p>

    <div class="skills">
      <span class="chip">Simulation</span>
      <span class="chip">Python</span>
      <span class="chip">Modeling</span>
      <span class="chip">Data Analysis</span>
      <span class="chip">Algorithm</span>
      <span class="chip">System Design</span>
    </div>

    <div class="divider"></div>

    <div class="contact">
      <a class="contact-item" onclick="copyEmail()" title="이메일 복사">
        <div class="contact-icon icon-email">📧</div>
        <div>
          <span class="contact-label">Email</span>
          <span class="contact-value">shampson618@gmail.com</span>
        </div>
      </a>
      <a class="contact-item linkedin" href="https://www.linkedin.com/in/donggi-sim/" target="_blank" rel="noopener" title="LinkedIn 프로필 방문">
        <div class="contact-icon icon-linkedin">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#0a8fcc" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
        </div>
        <div>
          <span class="contact-label">LinkedIn</span>
          <span class="contact-value">donggi-sim</span>
        </div>
      </a>
    </div>

    <div class="footer">© 2026 &nbsp;·&nbsp; 심동기 &nbsp;·&nbsp; SDG.DEV</div>
  </div>

  <div class="toast" id="toast">✅ 이메일이 복사되었습니다!</div>

  <script>
    // ── Particles ──────────────────────────────────────────
    const container = document.getElementById('particles');
    const colors = ['#6366f1', '#22d3ee', '#a78bfa', '#f472b6'];

    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 3 + 1.5;
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        width: ${size}px;
        height: ${size}px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        animation-duration: ${Math.random() * 12 + 8}s;
        animation-delay: ${Math.random() * -15}s;
        --drift: ${(Math.random() - 0.5) * 200}px;
        opacity: 0;
      `;
      container.appendChild(p);
    }

    // ── Card tilt on mouse move ─────────────────────────────
    const card = document.getElementById('card');
    let animFrame;

    document.addEventListener('mousemove', (e) => {
      cancelAnimationFrame(animFrame);
      animFrame = requestAnimationFrame(() => {
        const rect = card.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = (e.clientX - cx) / (window.innerWidth / 2);
        const dy = (e.clientY - cy) / (window.innerHeight / 2);
        const rotX = -dy * 6;
        const rotY = dx * 6;
        card.style.transform = `perspective(800px) rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.01)`;
      });
    });

    document.addEventListener('mouseleave', () => {
      card.style.transition = 'transform 0.6s ease';
      card.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg) scale(1)';
      setTimeout(() => { card.style.transition = ''; }, 600);
    });

    // ── Copy email ─────────────────────────────────────────
    function copyEmail() {
      const email = 'shampson618@gmail.com';
      navigator.clipboard.writeText(email).then(() => {
        showToast();
      }).catch(() => {
        const el = document.createElement('textarea');
        el.value = email;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        showToast();
      });
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ── Chip entrance animation ─────────────────────────────
    document.querySelectorAll('.chip').forEach((chip, i) => {
      chip.style.opacity = '0';
      chip.style.transform = 'translateY(12px)';
      chip.style.transition = `opacity 0.4s ease ${0.6 + i * 0.07}s, transform 0.4s ease ${0.6 + i * 0.07}s`;
      setTimeout(() => {
        chip.style.opacity = '1';
        chip.style.transform = 'translateY(0)';
      }, 50);
    });
  </script>
</body>
</html>
